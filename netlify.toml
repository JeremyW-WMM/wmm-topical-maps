[build]
  publish = "public"
  functions = "netlify/functions"

# Extend function timeout to 60s (max on Netlify Pro, 26s on free)
[functions]
  node_bundler = "esbuild"

[functions."maps"]
  timeout = 60

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
