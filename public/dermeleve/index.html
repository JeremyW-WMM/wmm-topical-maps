// ─── Layout Engine ───────────────────────────────────────────────────────────
const NODE_W = 130, NODE_H = 44, H_GAP = 44, V_GAP = 10;
const LEVEL_SIZES = [180, 148, 120, 112];
const LEVEL_H = [52, 46, 40, 36];

let svgEl, g, transform = {x:60, y:0, scale:1};
let dragging=false, lastX=0, lastY=0;
let collapsed = new Set();

function getColor(node, level) {
  if (level===0) return "#1a2b40";
  let n=node;
  while(n._parent) n=n._parent;
  return n.color||COLORS[0];
}

function lighten(hex, level) {
  const r=parseInt(hex.slice(1,3),16), g2=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const factors=[1,0.75,0.45,0.2];
  const f=factors[Math.min(level,3)];
  const mix=(c)=>Math.round(c*f+255*(1-f));
  return `rgb(${mix(r)},${mix(g2)},${mix(b)})`;
}

function buildLegend() {
  const leg=document.getElementById("legend");
  DATA.children.forEach((ct,i)=>{
    const d=document.createElement("div");
    d.className="leg-item";
    d.innerHTML=`<div class="leg-dot" style="background:${ct.color}"></div><span>${ct.name.replace("\n"," ")}</span>`;
    leg.appendChild(d);
  });
}

function assignParents(node, parent=null, level=0) {
  node._parent=parent; node._level=level;
  if(node.children) node.children.forEach(c=>assignParents(c,node,level+1));
}

function isCollapsed(node) { return collapsed.has(node); }

function visibleChildren(node) {
  if(!node.children||isCollapsed(node)) return [];
  return node.children;
}

function subtreeHeight(node) {
  const vc=visibleChildren(node);
  if(vc.length===0) return LEVEL_H[Math.min(node._level,3)]+V_GAP;
  const childH=vc.reduce((s,c)=>s+subtreeHeight(c),0);
  return Math.max(childH, LEVEL_H[Math.min(node._level,3)]+V_GAP);
}

function layoutTree(node, x, y) {
  node._x=x; node._y=y;
  const vc=visibleChildren(node);
  if(vc.length===0) return;
  let curY=y;
  const totalH=vc.reduce((s,c)=>s+subtreeHeight(c),0);
  const startY=y+(subtreeHeight(node)-totalH)/2;
  curY=startY;
  const lv=node._level;
  const nw=LEVEL_SIZES[Math.min(lv,3)];
  vc.forEach(c=>{
    const ch=subtreeHeight(c);
    layoutTree(c, x+nw+H_GAP, curY+(ch-LEVEL_H[Math.min(c._level,3)])/2);
    curY+=ch;
  });
}

function svgNS(){return "http://www.w3.org/2000/svg";}
function el(tag,attrs){const e=document.createElementNS(svgNS(),tag);Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));return e;}

function renderTree(node) {
  const lv=node._level;
  const nw=LEVEL_SIZES[Math.min(lv,3)];
  const nh=LEVEL_H[Math.min(lv,3)];
  const x=node._x, y=node._y;

  // Draw edges to children
  const vc=visibleChildren(node);
  vc.forEach(c=>{
    const cx=c._x, cy=c._y+LEVEL_H[Math.min(c._level,3)]/2;
    const ex=x+nw, ey=y+nh/2;
    const mx=(ex+cx)/2;
    const path=el("path",{
      d:`M${ex},${ey} C${mx},${ey} ${mx},${cy} ${cx},${cy}`,
      fill:"none",stroke:getColor(node,lv)||"#3d5a7e",
      "stroke-width": lv===0?2.5:lv===1?2:1.5,
      "stroke-opacity":"0.7"
    });
    g.appendChild(path);
  });

  // Node box
  const color=getColor(node,lv);
  const bg= lv===0?"#1a2b40":lighten(color,lv);
  const textColor= lv<=1?"#ffffff": lv===2?"#1a2332":"#2d3748";
  
  let strokeStyle="", strokeW="1.5", dashArr="";
  if(lv===3) {
    if(node.status==="Gap"){strokeStyle=color;dashArr="5,3";}
    else if(node.status==="Needs Update"){strokeStyle="#ffc107";dashArr="2,2";}
    else{strokeStyle=node.status==="Exists"?"#28a745":color;}
    const nodeBg= node.status==="Exists"?"rgba(40,167,69,0.12)":
                  node.status==="Needs Update"?"rgba(255,193,7,0.10)":
                  node.status==="Gap"?"rgba(220,53,69,0.10)": bg;
    const rect=el("rect",{x,y,width:nw,height:nh,rx:"6",
      fill:nodeBg,stroke:strokeStyle,"stroke-width":strokeW,
      "stroke-dasharray":dashArr});
    g.appendChild(rect);
  } else {
    const rect=el("rect",{x,y,width:nw,height:nh,rx: lv===0?"10":"6",
      fill:bg,stroke:lv===0?"#2d4a6e":color,
      "stroke-width": lv===0?"2":"1",
      "stroke-opacity":"0.5"});
    g.appendChild(rect);
  }

  // Text
  const lines=node.name.split("\n");
  const fontSize=lv===0?13:lv===1?11:lv===2?10:9;
  if(lines.length===1){
    const t=el("text",{x:x+nw/2,y:y+nh/2+fontSize*0.35,
      "text-anchor":"middle","font-size":fontSize,"fill":textColor,
      "font-family":"Segoe UI,Calibri,sans-serif",
      "font-weight": lv<=1?"bold":"normal",
      "pointer-events":"none"});
    t.textContent=lines[0];
    g.appendChild(t);
  } else {
    const lineH=fontSize*1.3;
    const totalH2=lineH*(lines.length-1);
    lines.forEach((line,i)=>{
      const t=el("text",{x:x+nw/2,y:y+nh/2-totalH2/2+i*lineH+fontSize*0.35,
        "text-anchor":"middle","font-size":fontSize,"fill":textColor,
        "font-family":"Segoe UI,Calibri,sans-serif",
        "font-weight": lv<=1?"bold":"normal",
        "pointer-events":"none"});
      t.textContent=line;
      g.appendChild(t);
    });
  }

  // Collapse toggle (levels 0-2)
  if(node.children && lv<=2){
    const tx=x+nw-10, ty=y+nh/2;
    const circ=el("circle",{cx:tx,cy:ty,r:"6",
      fill:lv===0?"#2d4a6e":color,"fill-opacity":"0.8",cursor:"pointer"});
    const sign=el("text",{x:tx,y:ty+3.5,"text-anchor":"middle",
      "font-size":"10","fill":"white","pointer-events":"none"});
    sign.textContent=isCollapsed(node)?"+":"−";
    circ.addEventListener("click",(e)=>{
      e.stopPropagation();
      if(isCollapsed(node)) collapsed.delete(node); else collapsed.add(node);
      redraw();
    });
    g.appendChild(circ);
    g.appendChild(sign);
  }

  // Tooltip on content idea nodes
  if(lv===3){
    const overlay=el("rect",{x,y,width:nw,height:nh,rx:"6",
      fill:"transparent",cursor:"pointer"});
    overlay.addEventListener("click",(e)=>{
      e.stopPropagation();
      openPanel(node.name.replace(/\n/g," "));
    });
    overlay.addEventListener("mouseenter",(e)=>{
      const tip=document.getElementById("tooltip");
      tip.style.display="block";
      tip.innerHTML=`<strong>${node.name.replace(/\n/g," ")}</strong><em style="display:block;margin-top:2px;color:#8ab4e0">Click to see full details</em>`;
    });
    overlay.addEventListener("mousemove",(e)=>{
      const tip=document.getElementById("tooltip");
      tip.style.left=(e.clientX+14)+"px";
      tip.style.top=(e.clientY-10)+"px";
    });
    overlay.addEventListener("mouseleave",()=>{
      document.getElementById("tooltip").style.display="none";
    });
    g.appendChild(overlay);
  }

  vc.forEach(c=>renderTree(c));
}

function redraw() {
  while(g.firstChild) g.removeChild(g.firstChild);
  layoutTree(DATA, 20, 0);

  // calc bounding box to center vertically
  let minY=Infinity,maxY=-Infinity;
  function bb(n){
    minY=Math.min(minY,n._y);
    maxY=Math.max(maxY,n._y+LEVEL_H[Math.min(n._level,3)]);
    visibleChildren(n).forEach(bb);
  }
  bb(DATA);
  const totalH=maxY-minY;
  const viewH=window.innerHeight-56;
  transform.y=Math.max(20, (viewH-totalH*transform.scale)/2);
  applyTransform();
  renderTree(DATA);
}

function applyTransform() {
  g.setAttribute("transform",`translate(${transform.x},${transform.y}) scale(${transform.scale})`);
}

function resetView() {
  transform={x:60,y:0,scale:1};
  redraw();
}
function expandAll() { collapsed.clear(); redraw(); }
function collapseAll() {
  function col(n){if(n._level>=2&&n.children)collapsed.add(n);if(n.children)n.children.forEach(col);}
  DATA.children.forEach(col);
  redraw();
}

function downloadPNG() {
  const s=document.getElementById("svg");
  const xml=new XMLSerializer().serializeToString(s);
  const blob=new Blob([xml],{type:"image/svg+xml"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="dermeleve-topical-authority-map.svg";
  a.click();
}

// ─── Init ────────────────────────────────────────────────────────────────────

function openPanel(nodeTitle) {
  const d = DETAIL[nodeTitle];
  if (!d) return;
  document.getElementById('panel-title').textContent = nodeTitle;
  document.getElementById('p-query').textContent = '"' + d.query + '"';
  document.getElementById('p-desc').textContent = d.desc;
  document.getElementById('p-link').textContent = d.lt;
  
  // chips
  const chips = document.getElementById('p-chips');
  chips.innerHTML = '';
  const pCls = d.prio==='High'?'chip-high':d.prio==='Medium'?'chip-med':'chip-low';
  chips.innerHTML += `<span class="chip ${pCls}">${d.prio}</span>`;
  const iCls = d.intent==='Commercial'?'chip-comm':d.intent==='Transactional'?'chip-trans':d.intent==='Navigational'?'chip-nav':'chip-info';
  chips.innerHTML += `<span class="chip ${iCls}">${d.intent}</span>`;
  chips.innerHTML += `<span class="chip chip-fmt">${d.fmt}</span>`;
  
  // status
  const sEl = document.getElementById('p-status');
  const sCls = d.status==='Exists'?'ps-exists':d.status==='Gap'?'ps-gap':'ps-update';
  sEl.innerHTML = `<span class="pstatus ${sCls}">${d.status}</span>`;
  
  // url
  const urlRow = document.getElementById('prow-url');
  const urlEl = document.getElementById('p-url');
  if (d.url) { urlRow.style.display='block'; urlEl.href=d.url; urlEl.textContent=d.url; }
  else { urlRow.style.display='none'; }
  
  // reset mark btn
  const btn = document.getElementById('mark-btn');
  btn.textContent = '✓ Mark Complete';
  btn.classList.remove('done');
  
  document.getElementById('panel').classList.add('open');
  document.getElementById('canvas-wrap').style.right = '320px';
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('canvas-wrap').style.right = '0';
}

function toggleMark(btn) {
  if (btn.classList.contains('done')) {
    btn.classList.remove('done'); btn.textContent = '✓ Mark Complete';
  } else {
    btn.classList.add('done'); btn.textContent = '✓ Marked Complete';
  }
}

window.addEventListener("load",()=>{
  assignParents(DATA);
  buildLegend();

  svgEl=document.getElementById("svg");
  svgEl.setAttribute("width","100%");
  svgEl.setAttribute("height","100%");
  g=document.createElementNS("http://www.w3.org/2000/svg","g");
  svgEl.appendChild(g);

  // Default: collapse level 3 sub-subtopics initially for overview
  function colL3(n){if(n._level===2&&n.children)collapsed.add(n);if(n.children)n.children.forEach(colL3);}
  DATA.children.forEach(colL3);

  redraw();

  // Zoom
  svgEl.addEventListener("wheel",(e)=>{
    e.preventDefault();
    const factor=e.deltaY<0?1.1:0.91;
    transform.scale=Math.max(0.15,Math.min(3,transform.scale*factor));
    applyTransform();
  });

  // Pan
  svgEl.addEventListener("mousedown",(e)=>{dragging=true;lastX=e.clientX;lastY=e.clientY;svgEl.classList.add("dragging");});
  window.addEventListener("mousemove",(e)=>{
    if(!dragging)return;
    transform.x+=e.clientX-lastX;
    transform.y+=e.clientY-lastY;
    lastX=e.clientX;lastY=e.clientY;
    applyTransform();
  });
  window.addEventListener("mouseup",()=>{dragging=false;svgEl.classList.remove("dragging");});
  window.addEventListener("resize",redraw);
});
</script>
