<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMM Topical Maps - Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;font-family:sans-serif;color:#c9d1d9;min-height:100vh}
#lock{position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.lb{width:100%;max-width:340px;text-align:center}
.lb h2{font-size:18px;font-weight:700;color:#58a6ff;margin-bottom:6px}
.lb p{font-size:12px;color:#484f58;margin-bottom:20px}
.lb input{width:100%;background:#010409;border:1px solid #21262d;border-radius:7px;padding:11px;color:#c9d1d9;font-size:14px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:10px}
.lb input:focus{border-color:#58a6ff}
.lb button{width:100%;padding:11px;background:#238636;border:1px solid #2ea043;border-radius:7px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.lb button:hover{background:#2ea043}
.le{color:#f85149;font-size:12px;margin-top:6px;display:none}
#app{display:none;max-width:820px;margin:0 auto;padding:24px}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid #21262d;margin-bottom:24px}
.hl{display:flex;align-items:center;gap:10px}
.hl img{height:32px;width:auto}
.ht{font-size:13px;font-weight:700;color:#e6edf3}
.hs{font-size:10px;color:#484f58;margin-top:1px}
.hr{display:flex;align-items:center;gap:8px}
.hb{background:none;border:1px solid #21262d;border-radius:6px;color:#484f58;padding:5px 10px;font-size:11px;cursor:pointer}
.hb:hover{border-color:#58a6ff;color:#58a6ff}
.pb{font-size:10px;color:#484f58;background:#010409;border:1px solid #21262d;border-radius:5px;padding:4px 8px;font-family:monospace}
.sec{margin-bottom:28px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#484f58}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#1a4a9e,#7c3aed)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fl{margin-bottom:12px}
.fl label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:#484f58;margin-bottom:5px}
.fl input{width:100%;background:#010409;border:1px solid #21262d;border-radius:7px;padding:9px 12px;color:#c9d1d9;font-size:13px;outline:none;font-family:monospace}
.fl input:focus{border-color:#58a6ff}
.dz{border:2px dashed #21262d;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.dz:hover,.dz.ov{border-color:#58a6ff;background:#58a6ff08}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz .dt{font-size:12px;color:#484f58}
.dz .df{font-size:12px;color:#3fb950;font-weight:700;margin-top:4px}
.up{background:#010409;border:1px solid #21262d;border-radius:6px;padding:7px 10px;font-size:11px;color:#484f58;margin:8px 0;display:flex;align-items:center;gap:5px;min-height:28px;font-family:monospace}
.up.on{color:#58a6ff;border-color:#1f3a6e}
.ud{width:5px;height:5px;border-radius:50%;background:#484f58;flex-shrink:0}
.pb2{width:100%;padding:10px;background:#238636;border:1px solid #2ea043;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.pb2:hover:not(:disabled){background:#2ea043}
.pb2:disabled{opacity:.4;cursor:not-allowed}
.log{background:#010409;border:1px solid #21262d;border-radius:8px;padding:10px 12px;font-family:monospace;font-size:11px;line-height:1.9;margin-top:12px;display:none;max-height:160px;overflow-y:auto}
.ok{color:#3fb950}.er{color:#f85149}.in{color:#58a6ff}.dm{color:#484f58}
.sb{background:#0f2a1a;border:1px solid #1a5c32;border-radius:8px;padding:10px 14px;margin-top:10px;display:none;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sb a{font-family:monospace;font-size:12px;color:#3fb950;text-decoration:none;font-weight:600}
.sb a:hover{text-decoration:underline}
.cb{padding:3px 10px;background:#1a5c3222;border:1px solid #22c55e44;border-radius:4px;color:#3fb950;font-size:10px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.mc{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:#58a6ff;opacity:.5}
.ms{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:3px}
.mu{font-family:monospace;font-size:10px;color:#484f58;margin-bottom:10px;word-break:break-all}
.ma{display:flex;gap:6px}
.mb{flex:1;padding:5px 6px;border-radius:5px;font-family:monospace;font-size:10px;cursor:pointer;border:1px solid #21262d;background:transparent;color:#484f58;transition:all .15s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}
.mb:hover{background:#21262d;color:#c9d1d9;border-color:#58a6ff}
.mb.dl:hover{background:#f8514910;border-color:#f8514960;color:#f85149}
.em{text-align:center;padding:36px 20px;color:#2a3547;border:1px dashed #21262d;border-radius:10px;font-size:12px;line-height:2}
.sk{background:linear-gradient(90deg,#161b22 25%,#21262d 50%,#161b22 75%);background-size:200% 100%;animation:sk 1.3s ease infinite;border-radius:8px;height:84px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.mb2{position:fixed;inset:0;background:#00000088;backdrop-filter:blur(3px);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
.mb2.op{opacity:1;pointer-events:all}
.md{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:22px;width:100%;max-width:320px;transform:translateY(12px);transition:transform .2s}
.mb2.op .md{transform:translateY(0)}
.md h3{font-size:14px;font-weight:700;margin-bottom:7px;color:#e6edf3}
.md p{font-size:12px;color:#8b949e;line-height:1.5;margin-bottom:18px}
.mda{display:flex;gap:8px}
.mdb{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #21262d;background:transparent;color:#8b949e}
.mdb:hover{background:#21262d;color:#c9d1d9}
.mdb.dg{background:#f8514912;border-color:#f8514950;color:#f85149}
.mdb.dg:hover{background:#f8514922}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:#21262d;border:1px solid #30363d;border-radius:8px;padding:8px 16px;font-size:12px;color:#c9d1d9;z-index:200;opacity:0;transition:all .2s;white-space:nowrap}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:540px){.row{grid-template-columns:1fr}}
</style>
</head>

    <button onclick="ul()">Unlock</button>
    <div class="le" id="le">Incorrect password</div>
  </div>
</div>

      <div>
        <div class="ht">Topical Maps Admin</div>
        <div class="hs">Weiss Media Marketing</div>
      </div>
    </div>
    <div class="hr">
      <div class="pb" id="pb">PAT: not set</div>
      <button class="hb" onclick="lk()">Lock</button>
    </div>
  </header>
  <div class="sec">
    <div class="sh"><div class="st">Deploy New Map</div></div>
    <div class="card">
      <div class="row">
        <div class="fl"><label>Client Name</label><input type="text" id="cn" placeholder="Partner in Aging" oninput="nn()"></div>
        <div class="fl"><label>URL Slug</label><input type="text" id="sl" placeholder="partner-in-aging" oninput="ns()"></div>
      </div>
      <div class="fl">
        <label>Map HTML File</label>
        <div class="dz" id="dz">
          <input type="file" id="fi" accept=".html" onchange="nf(this.files[0])">
          <div class="dt">Drop .html file or click to browse</div>
          <div class="df" id="df"></div>
        </div>
      </div>
      <div class="up" id="up"><div class="ud" id="ud"></div><span id="ut">Enter a slug to preview URL</span></div>
      <button class="pb2" id="dbtn" onclick="dm()" disabled>Deploy Map</button>
      <div class="log" id="lg"></div>
      <div class="sb" id="sb">
        <span>Live at:</span>
        <a id="lu" href="#" target="_blank"></a>
        <button class="cb" onclick="cl()">Copy</button>
      </div>
    </div>
  </div>
  <div class="sec">
    <div class="sh">
      <div class="st">Deployed Maps</div>
      <button class="hb" onclick="lm()">Refresh</button>
    </div>
    <div class="grid" id="mg">
      <div class="sk"></div><div class="sk"></div><div class="sk"></div>
    </div>
  </div>
</div>
<div class="mb2" id="delm">
  <div class="md">
    <h3>Remove map?</h3>
    <p id="dmp">This will remove the map.</p>
    <div class="mda">
      <button class="mdb" onclick="cd()">Cancel</button>
      <button class="mdb dg" onclick="dd()">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var REPO = 'JeremyW-WMM/wmm-topical-maps';
var PW   = 'wmm2025';
var BASE = 'https://topicalmaps.weissmediamarketing.com';
var pat  = '';
var fc   = null;
var dt   = null;

function ul() {
  var v = document.getElementById('pw').value;
  if (v === PW) {
    sessionStorage.setItem('wu', '1');
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display  = 'block';
    pat = localStorage.getItem('wp') || '';
    if (!pat) {
      pat = prompt('Enter your GitHub PAT:') || '';
      if (pat) localStorage.setItem('wp', pat);
    }
    document.getElementById('pb').textContent = pat ? 'PAT: ' + pat.slice(0,8) + '...' : 'PAT: not set';
    lm(); cr();
  } else {
    var e = document.getElementById('le');
    e.style.display = 'block';
    setTimeout(function() { e.style.display = 'none'; }, 2000);
    document.getElementById('pw').value = '';
  }
}
function lk() {
  sessionStorage.removeItem('wu');
  document.getElementById('lock').style.display = 'flex';
  document.getElementById('app').style.display  = 'none';
  document.getElementById('pw').value = '';
}
if (sessionStorage.getItem('wu')) {
  pat = localStorage.getItem('wp') || '';
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display  = 'block';
  document.getElementById('pb').textContent = pat ? 'PAT: ' + pat.slice(0,8) + '...' : 'PAT: not set';
  lm();
}
document.getElementById('pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') ul(); });
function tst(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.classList.add('sh');
  setTimeout(function() { t.classList.remove('sh'); }, 2500);
}
function pl(m, c) {
  var e = document.getElementById('lg');
  e.style.display = 'block';
  e.innerHTML += '<div class="' + (c||'in') + '">' + m + '</div>';
  e.scrollTop = e.scrollHeight;
}
function sg(s) {
  return s.toLowerCase().replace(/[^a-z0-9 -]/g,'').trim().replace(/ +/g,'-').replace(/-+/g,'-');
}
function b64(s) {
  var b = new TextEncoder().encode(s), bin = '', C = 8192;
  for (var i = 0; i < b.length; i += C) bin += String.fromCharCode.apply(null, b.subarray(i, i+C));
  return btoa(bin);
}
async function gh(m, p, body) {
  var o = { method: m, headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json', 'User-Agent': 'WMM-Admin' } };
  if (body) o.body = JSON.stringify(body);
  var r = await fetch('https://api.github.com/repos/' + REPO + p, o);
  return { s: r.status, d: await r.json().catch(function() { return {}; }) };
}
function nn() { document.getElementById('sl').value = sg(document.getElementById('cn').value); up2(); cr(); }
function ns() { up2(); cr(); }
function up2() {
  var s = document.getElementById('sl').value.trim();
  var u = document.getElementById('up'), ud = document.getElementById('ud'), ut = document.getElementById('ut');
  if (s) { ut.textContent = BASE.replace('https://','') + '/' + sg(s); u.classList.add('on'); ud.style.background = '#58a6ff'; }
  else   { ut.textContent = 'Enter a slug to preview URL'; u.classList.remove('on'); ud.style.background = '#484f58'; }
}
function nf(f) {
  if (!f) return;
  document.getElementById('df').textContent = f.name;
  var r = new FileReader();
  r.onload = function(e) { fc = e.target.result; cr(); };
  r.readAsText(f, 'UTF-8');
}
var dz = document.getElementById('dz');
dz.addEventListener('dragover',  function(e) { e.preventDefault(); dz.classList.add('ov'); });
dz.addEventListener('dragleave', function()  { dz.classList.remove('ov'); });
dz.addEventListener('drop', function(e) {
  e.preventDefault(); dz.classList.remove('ov');
  var f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.html')) nf(f); else tst('Please drop an .html file');
});
function cr() {
  document.getElementById('dbtn').disabled = !(document.getElementById('sl').value.trim() && fc && pat);
}
async function dm() {
  var slug = sg(document.getElementById('sl').value.trim());
  if (!slug || !fc || !pat) return;
  document.getElementById('lg').innerHTML = '';
  document.getElementById('lg').style.display = 'block';
  document.getElementById('sb').style.display = 'none';
  var btn = document.getElementById('dbtn');
  btn.disabled = true; btn.textContent = 'Deploying...';
  var path = '/contents/public/' + slug + '/index.html';
  var ex = await gh('GET', path);
  var sha = ex.s === 200 ? ex.d.sha : null;
  pl('public/' + slug + '/index.html');
  var body = { message: 'Deploy: ' + slug, content: b64(fc) };
  if (sha) body.sha = sha;
  var res = await gh('PUT', path, body);
  if (res.s === 200 || res.s === 201) {
    pl('Pushed OK', 'ok');
    pl('Netlify deploying (~20s)...', 'in');
    var url = BASE + '/' + slug;
    document.getElementById('lu').href = url;
    document.getElementById('lu').textContent = url.replace('https://','');
    document.getElementById('sb').style.display = 'flex';
    tst('Deployed!');
    setTimeout(lm, 3000);
  } else {
    pl('Failed: ' + (res.d.message || 'unknown'), 'er');
    tst('Deploy failed');
  }
  btn.disabled = false; btn.textContent = 'Deploy Map'; cr();
}
function cl() { navigator.clipboard.writeText(document.getElementById('lu').href).then(function() { tst('Copied!'); }); }
async function lm() {
  var g = document.getElementById('mg');
  g.innerHTML = '<div class="sk"></div><div class="sk"></div><div class="sk"></div>';
  if (!pat) { g.innerHTML = '<div class="em">No PAT - lock and unlock to enter one.</div>'; return; }
  var res = await gh('GET', '/contents/public');
  if (res.s !== 200 || !Array.isArray(res.d)) { g.innerHTML = '<div class="em">No maps yet.</div>'; return; }
  var dirs = res.d.filter(function(i) { return i.type === 'dir'; });
  if (!dirs.length) { g.innerHTML = '<div class="em">No maps deployed yet.</div>'; return; }
  g.innerHTML = dirs.map(function(d) {
    var url = BASE + '/' + d.name;
    return '<div class="mc"><div class="ms">' + d.name + '</div><div class="mu">' + url.replace('https://','') + '</div>' +
      '<div class="ma">' +
      '<a class="mb" href="' + url + '" target="_blank">View</a>' +
      '<button class="mb" onclick="cu('' + url + '')">Copy</button>' +
      '<button class="mb dl" onclick="od('' + d.name + '')">Remove</button>' +
      '</div></div>';
  }).join('');
}
function cu(url) { navigator.clipboard.writeText(url).then(function() { tst('Copied!'); }); }
function od(s) { dt = s; document.getElementById('dmp').textContent = 'Remove "' + s + '"? URL stops working after ~20s.'; document.getElementById('delm').classList.add('op'); }
function cd() { document.getElementById('delm').classList.remove('op'); dt = null; }
document.getElementById('delm').addEventListener('click', function(e) { if (e.target.id === 'delm') cd(); });
async function dd() {
  if (!dt) return; cd(); tst('Removing...');
  var fr = await gh('GET', '/contents/public/' + dt);
  if (fr.s !== 200 || !Array.isArray(fr.d)) { tst('Folder not found'); return; }
  var files = fr.d.filter(function(f) { return f.type === 'file'; });
  if (!files.length) { tst('No files found'); return; }
  var ok = true;
  for (var i = 0; i < files.length; i++) {
    var r = await gh('DELETE', '/contents/public/' + dt + '/' + files[i].name, { message: 'Remove: ' + dt, sha: files[i].sha });
    if (r.s !== 200) ok = false;
  }
  if (ok) { tst('Removed!'); lm(); } else tst('Delete failed - try GitHub directly');
}
</script>
</body>
