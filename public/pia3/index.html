        {id:"c7s2d",label:"Finding Bereavement Support",pri:"Medium",intent:"Informational",query:"bereavement support after losing parent",desc:"Guides grieving family members to professional and peer support resources.",fmt:"Blog Post",link:"End-of-Life Planning"},

        {id:"c7s3c",label:"Veterans Burial Benefits",pri:"Medium",intent:"Informational",query:"veterans burial benefits",desc:"Explains free national cemetery burial, headstones, burial flags, and funeral honors for qualifying veterans.",fmt:"Blog Post",link:"Benefits & Financial Planning"},
        {id:"c7s3d",label:"Organizing Docs After Death",pri:"Medium",intent:"Informational",query:"organizing documents after parent dies",desc:"Guides families through gathering, organizing, and filing critical documents after a loss.",fmt:"Blog Post",link:"End-of-Life Planning"},

// ── Layout engine ─────────────────────────────────────────────────────────────
const svg = document.getElementById("svg");
const wrap = document.querySelector("#canvas-wrap");
let vx=0,vy=0,vscale=1,dragging=false,lastX,lastY;
let collapsed = new Set();

const PRI_COLORS = {High:"#22c55e",Medium:"#f59e0b",Low:"#94a3b8"};

function getColor(node) {
  let n = node;
  while(n.parent && !n.color) n = n.parent;
  return n.color || "#2563eb";
}

function assignParents(node, parent=null) {
  node.parent = parent;
  if(node.children) node.children.forEach(c => assignParents(c, node));
}
assignParents(tree);

function countVisible(node) {
  if(!node.children || node.children.length===0) return 1;
  if(collapsed.has(node.id)) return 1;
  return 1 + node.children.reduce((s,c) => s+countVisible(c), 0);
}

// Minimum height each leaf node needs
const LEAF_H = { 0: 0, 1: 52, 2: 38, 3: 26 };
const GAP_X  = { 0: 370, 1: 310, 2: 260 };
const MIN_GAP = { 0: 20, 1: 16, 2: 12 };

// Returns the total vertical span a subtree needs
function subtreeH(node, depth) {
  if(!node.children || node.children.length===0 || collapsed.has(node.id)) {
    return LEAF_H[depth] || 26;
  }
  const children = node.children;
  const childDepth = depth + 1;
  const total = children.reduce((s,c) => s + subtreeH(c, childDepth), 0);
  const gaps  = (children.length - 1) * (MIN_GAP[depth] || 12);
  return Math.max(total + gaps, LEAF_H[depth] || 26);
}

function layout(node, x, y, depth) {
  node.x = x; node.y = y; node.depth = depth;
  if(!node.children || node.children.length===0 || collapsed.has(node.id)) return;
  const children = node.children;
  const childDepth = depth + 1;
  const childX = x + (GAP_X[depth] || 260);

  // Compute each child's span and lay them out top-to-bottom centered on y
  const spans = children.map(c => subtreeH(c, childDepth));
  const gap   = MIN_GAP[depth] || 12;
  const totalH = spans.reduce((s,v) => s+v, 0) + gap*(children.length-1);

  let cursor = y - totalH/2;
  children.forEach((child, i) => {
    const cy = cursor + spans[i]/2;
    layout(child, childX, cy, childDepth);
    cursor += spans[i] + gap;
  });
}

function render() {
  layout(tree, 80, 0, 0);
  svg.innerHTML = "";
  drawLinks(tree);
  drawNodes(tree);
  const allN = getAllNodes(tree);
  document.getElementById("vis-count").textContent = allN.filter(n=>isVisible(n)).length;
}

function isVisible(node) {
  let n = node.parent;
  while(n) {
    if(collapsed.has(n.id)) return false;
    n = n.parent;
  }
  return true;
}

function getAllNodes(node) {
  const out = [node];
  if(node.children) node.children.forEach(c => out.push(...getAllNodes(c)));
  return out;
}

function drawLinks(node) {
  if(!node.children || collapsed.has(node.id)) return;
  const color = getColor(node);
  node.children.forEach(child => {
    const line = document.createElementNS("http://www.w3.org/2000/svg","path");
    const mx = (node.x + child.x) / 2;
    line.setAttribute("d",`M${node.x} ${node.y} C${mx} ${node.y}, ${mx} ${child.y}, ${child.x} ${child.y}`);
    line.setAttribute("stroke", color);
    line.setAttribute("stroke-width", node.depth===0 ? "2.5" : node.depth===1 ? "1.5" : "1");
    line.setAttribute("fill","none");
    line.setAttribute("opacity","0.5");
    svg.appendChild(line);
    drawLinks(child);
  });
}

function drawNodes(node) {
  const color = getColor(node);
  const depth = node.depth;
  const isRoot = depth===0;
  const isCT   = depth===1;
  const isST   = depth===2;
  const isCI   = depth===3;

  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("transform",`translate(${node.x},${node.y})`);
  g.style.cursor = (node.children && node.children.length) ? "pointer" : "default";

  if(isRoot) {
    const rx=48, ry=30;
    const el = document.createElementNS("http://www.w3.org/2000/svg","ellipse");
    el.setAttribute("rx",rx); el.setAttribute("ry",ry);
    el.setAttribute("fill","#0f1923"); el.setAttribute("stroke","#4a8ac4"); el.setAttribute("stroke-width","2");
    g.appendChild(el);
    const t = svgText(node.label, 0, 0, "13", "bold", "#e8f0fb", true);
    g.appendChild(t);
  } else if(isCT) {
    const w=150, h=52;
    const clipIdCT = "clip_ct_"+node.id;
    const clipElCT = document.createElementNS("http://www.w3.org/2000/svg","clipPath");
    clipElCT.setAttribute("id", clipIdCT);
    const clipRctCT = document.createElementNS("http://www.w3.org/2000/svg","rect");
    clipRctCT.setAttribute("x", String(-w/2+4)); clipRctCT.setAttribute("y", String(-h/2));
    clipRctCT.setAttribute("width", String(w-24)); clipRctCT.setAttribute("height", String(h));
    clipElCT.appendChild(clipRctCT);
    g.appendChild(clipElCT);
    const rect = roundRect(-w/2,-h/2,w,h,10, "#0f1923", "1");
    rect.setAttribute("stroke", color); rect.setAttribute("stroke-width","2");
    g.appendChild(rect);
    const t = svgText(node.label, 0, 0, "11", "bold", "#fff", true);
    t.setAttribute("clip-path","url(#"+clipIdCT+")");
    g.appendChild(t);
    const coll = collapsed.has(node.id);
    const ind = svgText(coll?"+":"−", w/2-14, -h/2+14, "14","bold", color, false);
    g.appendChild(ind);
  } else if(isST) {
    const w=165, h=34;
    const clipId = "clip_st_"+node.id;
    const clipEl = document.createElementNS("http://www.w3.org/2000/svg","clipPath");
    clipEl.setAttribute("id", clipId);
    const clipRct = document.createElementNS("http://www.w3.org/2000/svg","rect");
    clipRct.setAttribute("x", String(-w/2+3)); clipRct.setAttribute("y", String(-h/2));
    clipRct.setAttribute("width", String(w-22)); clipRct.setAttribute("height", String(h));
    clipEl.appendChild(clipRct);
    g.appendChild(clipEl);
    const rect = roundRect(-w/2,-h/2,w,h,7, "#0f1923", "1");
    rect.setAttribute("stroke", color); rect.setAttribute("stroke-width","1");
    g.appendChild(rect);
    const t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x","0"); t.setAttribute("y","0");
    t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
    t.setAttribute("font-size","10"); t.setAttribute("font-weight","600");
    t.setAttribute("fill",color); t.setAttribute("font-family","'Segoe UI',Arial,sans-serif");
    t.setAttribute("clip-path","url(#"+clipId+")");
    t.textContent = node.label;
    g.appendChild(t);
    const coll = collapsed.has(node.id);
    const ind = svgText(coll?"+":"−", w/2-10, -h/2+12, "11","bold", color, false);
    g.appendChild(ind);
  } else if(isCI) {
    const w=190, h=28;
    const priColor = PRI_COLORS[node.pri] || "#94a3b8";
    // clip path so text never escapes the box
    const clipId = "clip_"+node.id;
    const clipEl = document.createElementNS("http://www.w3.org/2000/svg","clipPath");
    clipEl.setAttribute("id", clipId);
    const clipRect = document.createElementNS("http://www.w3.org/2000/svg","rect");
    clipRect.setAttribute("x", -w/2+2); clipRect.setAttribute("y", -h/2);
    clipRect.setAttribute("width", w-4); clipRect.setAttribute("height", h);
    clipEl.appendChild(clipRect);
    g.appendChild(clipEl);
    const rect = roundRect(-w/2,-h/2,w,h,5, "#0f1923", "1");
    rect.setAttribute("stroke", color); rect.setAttribute("stroke-width","0.8"); rect.setAttribute("stroke-opacity","0.5");
    g.appendChild(rect);
    // priority dot
    const dot = document.createElementNS("http://www.w3.org/2000/svg","circle");
    dot.setAttribute("cx",-w/2+10); dot.setAttribute("cy",0);
    dot.setAttribute("r","4"); dot.setAttribute("fill",priColor);
    g.appendChild(dot);
    const t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x", -w/2+20);
    t.setAttribute("y", "0");
    t.setAttribute("text-anchor","start");
    t.setAttribute("dominant-baseline","central");
    t.setAttribute("font-size","9.5");
    t.setAttribute("font-weight","normal");
    t.setAttribute("fill","#c8ddf0");
    t.setAttribute("font-family","'Segoe UI',Arial,sans-serif");
    t.setAttribute("clip-path",`url(#${clipId})`);
    t.textContent = node.label;
    g.appendChild(t);
  }

  g.addEventListener("click", (e) => {
    e.stopPropagation();
    if(node.children && node.children.length) {
      if(collapsed.has(node.id)) collapsed.delete(node.id);
      else collapsed.add(node.id);
      render();
    }
  });

  if(node.depth === 3) {
    g.addEventListener("click", (e) => {
      e.stopPropagation();
      openPanel(node);
    });
  } else if(node.desc) {
    g.addEventListener("click", (e) => {
      e.stopPropagation();
      openPanelDesc(node);
    });
  }

  svg.appendChild(g);
  if(node.children && !collapsed.has(node.id)) node.children.forEach(c => drawNodes(c));
}

function roundRect(x,y,w,h,r,fill,opacity) {
  const el = document.createElementNS("http://www.w3.org/2000/svg","rect");
  el.setAttribute("x",x); el.setAttribute("y",y); el.setAttribute("width",w); el.setAttribute("height",h);
  el.setAttribute("rx",r); el.setAttribute("fill",fill); el.setAttribute("fill-opacity",opacity||"1");
  return el;
}

function svgText(text, x, y, size, weight, color, multiline) {
  const lines = text.split("\n");
  if(lines.length===1 || !multiline) {
    const t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",x); t.setAttribute("y",y);
    t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
    t.setAttribute("font-size",size); t.setAttribute("font-weight",weight);
    t.setAttribute("fill",color); t.setAttribute("font-family","'Segoe UI',Arial,sans-serif");
    t.textContent = lines[0];
    return t;
  }
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  const lh = parseFloat(size) + 3;
  const startY = y - (lines.length-1)*lh/2;
  lines.forEach((line,i) => {
    const t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",x); t.setAttribute("y",startY + i*lh);
    t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
    t.setAttribute("font-size",size); t.setAttribute("font-weight",weight);
    t.setAttribute("fill",color); t.setAttribute("font-family","'Segoe UI',Arial,sans-serif");
    t.textContent = line;
    g.appendChild(t);
  });
  return g;
}

// ── Pan & Zoom ─────────────────────────────────────────────────────────────────
function applyTransform() {
  svg.setAttribute("viewBox",`${vx} ${vy} ${wrap.clientWidth/vscale} ${wrap.clientHeight/vscale}`);
}

wrap.addEventListener("mousedown", e => { dragging=true; lastX=e.clientX; lastY=e.clientY; wrap.classList.add("dragging"); });
window.addEventListener("mouseup", () => { dragging=false; wrap.classList.remove("dragging"); });
window.addEventListener("mousemove", e => {
  if(!dragging) return;
  vx -= (e.clientX-lastX)/vscale; vy -= (e.clientY-lastY)/vscale;
  lastX=e.clientX; lastY=e.clientY; applyTransform();
});
wrap.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const mx = vx + e.offsetX/vscale, my = vy + e.offsetY/vscale;
  vscale *= factor;
  vx = mx - e.offsetX/vscale; vy = my - e.offsetY/vscale;
  applyTransform();
}, {passive:false});

function resetView() { vx=-100; vy=-600; vscale=0.55; applyTransform(); }
function expandAll()  { collapsed.clear(); render(); }
function collapseAll(){ tree.children.forEach(c=>collapsed.add(c.id)); render(); }
function downloadSVG() {
  const s = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([s],{type:"image/svg+xml"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="partner-in-aging-topical-map.svg"; a.click();
}

// ── Info Panel ───────────────────────────────────────────────────────────────
function closePanel() {
  document.getElementById("info-panel").classList.add("hidden");
}
function openPanel(node) {
  const panel = document.getElementById("info-panel");
  const inner = document.getElementById("panel-inner");
  const color = getColor(node);
  const pc = PRI_COLORS[node.pri] || "#94a3b8";
  const intentColors = {Informational:"#60a5fa",Commercial:"#f59e0b",Transactional:"#34d399",Navigational:"#a78bfa"};
  const ic = intentColors[node.intent] || "#94a3b8";

  let html = `<div style="font-size:14px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:14px;padding-right:20px">${node.label}</div>`;

  if(node.query) {
    html += `<div class="pf-label">Sample Query</div>`;
    html += `<div class="pf-value" style="font-style:italic;color:#93c5fd">"${node.query}"</div>`;
  }
  if(node.desc) {
    html += `<div class="pf-label">Description</div>`;
    html += `<div class="pf-value">${node.desc}</div>`;
  }
  html += `<div class="pf-label">Details</div><div>`;
  if(node.pri)    html += `<span class="pf-badge" style="background:${pc}22;color:${pc};border:1px solid ${pc}55">● ${node.pri}</span>`;
  if(node.intent) html += `<span class="pf-badge" style="background:${ic}22;color:${ic};border:1px solid ${ic}55">${node.intent}</span>`;
  if(node.fmt)    html += `<span class="pf-badge" style="background:#1a2d4588;color:#a8c2e0;border:1px solid #2d4a6e">${node.fmt}</span>`;
  html += `</div>`;
  if(node.link) {
    html += `<div class="pf-label">Internal Linking Target</div>`;
    html += `<div class="pf-value" style="color:${color}">→ ${node.link}</div>`;
  }

  inner.innerHTML = html;
  panel.classList.remove("hidden");
}
function openPanelDesc(node) {
  const panel = document.getElementById("info-panel");
  const inner = document.getElementById("panel-inner");
  const color = getColor(node);
  let html = `<div style="font-size:14px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:10px;padding-right:20px">${node.label.replace(/\n/," ")}</div>`;
  if(node.desc) html += `<div class="pf-label">About</div><div class="pf-value">${node.desc}</div>`;
  inner.innerHTML = html;
  panel.classList.remove("hidden");
}

// ── Legend ──────────────────────────────────────────────────────────────────────
const li = document.getElementById("legend-items");
tree.children.forEach(ct => {
  const d = document.createElement("div"); d.className="leg-item";
  d.innerHTML=`<div class="leg-dot" style="background:${ct.color}"></div>${ct.label.replace("\n"," ")}`;
  li.appendChild(d);
});
// Priority legend
const pdiv = document.createElement("div"); 
pdiv.innerHTML=`<div style="border-top:1px solid #2d4a6e;margin:8px 0 6px"></div><div style="font-size:11px;color:#6b8cae;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Priority</div>`;
li.appendChild(pdiv);
[["High","#22c55e"],["Medium","#f59e0b"],["Low","#94a3b8"]].forEach(([p,c]) => {
  const d = document.createElement("div"); d.className="leg-item";
  d.innerHTML=`<div class="leg-dot" style="background:${c}"></div>${p}`;
  li.appendChild(d);
});

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener("resize", () => applyTransform());
// Start with subtopics collapsed for clean view
tree.children.forEach(ct => ct.children && ct.children.forEach(st => collapsed.add(st.id)));
render();
resetView();
</script>
